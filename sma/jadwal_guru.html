<!DOCTYPE html>
<html>
<head>

<title>Jadwal Pelajaran</title>

<style>

body{
 margin:0;
 font-family:Arial;
 background:#1e2235;
 color:white;
 padding:30px;
}

/* TITLE */

h2{
 margin-bottom:20px;
}

/* TABLE */

.table-container{
 overflow-x:auto;
}

table{
 width:100%;
 border-collapse:collapse;
 background:#2b3048;
 border-radius:10px;
 overflow:hidden;
 box-shadow:0 10px 25px rgba(0,0,0,0.3);
 min-width:700px;
}

thead{
 background:#3498db;
}

th{
 padding:15px;
 text-align:left;
}

td{
 padding:12px;
 border-bottom:1px solid #3a3f5a;
}

/* ZEBRA */

tbody tr:nth-child(even){
 background:#252a40;
}

/* HOVER */

tbody tr:hover{
 background:#3a3f5a;
 transition:0.3s;
}

/* BUTTON */

.btn{
 padding:8px 12px;
 border:none;
 border-radius:6px;
 cursor:pointer;
 color:white;
 margin-right:5px;
}

.edit{
 background:#f39c12;
}

.delete{
 background:#e74c3c;
}

/* FIX UNDEFINED */

.empty{
 color:#aaa;
 font-style:italic;
}

/* RESPONSIVE */

@media(max-width:768px){

 body{
  padding:10px;
 }

 h2{
  font-size:20px;
 }

 th,td{
  font-size:13px;
 }

 .btn{
  padding:6px 10px;
  font-size:12px;
 }

}

</style>

</head>

<body>

<h2>Jadwal Pelajaran</h2>

<div class="table-container">

<table>

<thead>
<tr>
<th>Kelas</th>
<th>Mapel</th>
<th>Guru</th>
<th>Hari</th>
<th>Jam</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

<script>

// ================= LOAD DATA =================
async function load(){

 const r = await fetch(
  "http://127.0.0.1:5000/get-jadwal"
 )

 const d = await r.json()

 let html = ""

 d.forEach((j,i) => {

  html += `
  <tr>

   <td>${j.kelas || '<span class="empty">-</span>'}</td>

   <td>${j.mapel || '<span class="empty">-</span>'}</td>

   <td>${j.guru || '<span class="empty">-</span>'}</td>

   <td>${j.hari || '<span class="empty">-</span>'}</td>

   <td>${j.jam || '<span class="empty">-</span>'}</td>

   <td>

    <button 
     class="btn edit"
     onclick="editData('${j.kelas}','${j.mapel}','${j.guru}','${j.hari}','${j.jam}')"
    >
     Edit
    </button>

    <button 
     class="btn delete"
     onclick="hapusData('${j.kelas}','${j.mapel}','${j.hari}')"
    >
     Hapus
    </button>

   </td>

  </tr>
  `
 })

 document.getElementById("data").innerHTML = html

}

// ================= EDIT =================
async function editData(kelas,mapel,guru,hari,jam){

 let kelasBaru = prompt("Edit kelas", kelas)
 if(kelasBaru===null) return

 let mapelBaru = prompt("Edit mapel", mapel)
 if(mapelBaru===null) return

 let guruBaru = prompt("Edit guru", guru)
 if(guruBaru===null) return

 let hariBaru = prompt("Edit hari", hari)
 if(hariBaru===null) return

 let jamBaru = prompt("Edit jam", jam)
 if(jamBaru===null) return

 await fetch(
  "http://127.0.0.1:5000/update-jadwal",
 {

  method:"PUT",

  headers:{
   "Content-Type":"application/json"
  },

  body:JSON.stringify({

   kelasLama:kelas,
   mapelLama:mapel,
   hariLama:hari,

   kelas:kelasBaru,
   mapel:mapelBaru,
   guru:guruBaru,
   hari:hariBaru,
   jam:jamBaru

  })

 })

 alert("Jadwal berhasil diupdate")

 load()

}

// ================= HAPUS =================
async function hapusData(kelas,mapel,hari){

 let konfirmasi = confirm(
  "Yakin ingin menghapus jadwal?"
 )

 if(!konfirmasi) return

 await fetch(
  "http://127.0.0.1:5000/hapus-jadwal",
 {

  method:"DELETE",

  headers:{
   "Content-Type":"application/json"
  },

  body:JSON.stringify({

   kelas:kelas,
   mapel:mapel,
   hari:hari

  })

 })

 alert("Jadwal berhasil dihapus")

 load()

}

// ================= START =================
load()

</script>

</body>
</html>
