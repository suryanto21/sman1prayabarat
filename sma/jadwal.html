<!DOCTYPE html>
<html>
<head>

<title>Jadwal Pelajaran Siswa</title>

<link rel="stylesheet" href="/css/style.css">

<style>

body{
 background:#1e2235;
 color:white;
 font-family:Arial;
 margin:0;
 padding:20px;
}

.container{
 max-width:1000px;
 margin:auto;
}

h2{
 margin-bottom:20px;
 text-align:center;
}

.table-container{
 overflow-x:auto;
}

table{
 width:100%;
 border-collapse:collapse;
 background:#272b3d;
 border-radius:10px;
 overflow:hidden;
}

th,td{
 padding:12px;
 border-bottom:1px solid #444;
 text-align:left;
}

th{
 background:#3498db;
}

tr:hover{
 background:#32384f;
}

/* RESPONSIVE */

@media(max-width:768px){

 table{
  min-width:700px;
 }

 h2{
  font-size:20px;
 }

 th,td{
  font-size:13px;
 }

}

</style>

</head>

<body>

<div class="container">

<h2>Jadwal Pelajaran</h2>

<div class="table-container">

<table>

<thead>
<tr>
 <th>Kelas</th>
 <th>Mata Pelajaran</th>
 <th>Guru</th>
 <th>Hari</th>
 <th>Jam</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<script>

// ================= AMBIL DATA LOGIN =================
const user = JSON.parse(localStorage.getItem("user"))

// ================= LOAD JADWAL =================
async function loadJadwal(){

 // ambil data siswa berdasarkan username/NIS
 let rs = await fetch("http://127.0.0.1:5000/get-siswa")

 let siswa = await rs.json()

 // cari siswa login
 let dataSiswa = siswa.find(
  s => s.nis == user.username
 )

 if(!dataSiswa){

  tbody.innerHTML = `
   <tr>
    <td colspan="5">Data siswa tidak ditemukan</td>
   </tr>
  `
  return
 }

 // ambil jadwal
 let r = await fetch("http://127.0.0.1:5000/get-jadwal")

 let jadwal = await r.json()

 // filter sesuai kelas siswa
 jadwal = jadwal.filter(
  j => j.kelas == dataSiswa.kelas
 )

 let html = ""

 if(jadwal.length == 0){

  html = `
   <tr>
    <td colspan="5">
     Jadwal belum tersedia
    </td>
   </tr>
  `

 }else{

  jadwal.forEach(j=>{

   html += `
   <tr>
    <td>${j.kelas}</td>
    <td>${j.mapel}</td>
    <td>${j.guru}</td>
    <td>${j.hari}</td>
    <td>${j.jam}</td>
   </tr>
   `

  })

 }

 tbody.innerHTML = html
}

loadJadwal()

</script>

</body>
</html>
