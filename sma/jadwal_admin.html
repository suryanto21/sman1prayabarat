<!DOCTYPE html>
<html>
<head>

<title>Input Jadwal</title>

<style>

body{
 margin:0;
 font-family:Arial;
 background:#1e2235;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:white;
}

/* CARD */

.form-card{
 background:#2b3048;
 padding:30px;
 border-radius:15px;
 width:380px;
 box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

.form-card h2{
 text-align:center;
 margin-bottom:20px;
}

/* FORM */

.form-group{
 margin-bottom:15px;
}

.form-group label{
 display:block;
 margin-bottom:5px;
}

.form-group input{
 width:100%;
 padding:12px;
 border-radius:8px;
 border:none;
 outline:none;
}

/* BUTTON */

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 background:#27ae60;
 border:none;
 border-radius:8px;
 color:white;
 font-size:16px;
 cursor:pointer;
 transition:0.3s;
}

button:hover{
 background:#219150;
 transform:scale(1.03);
}

</style>

</head>

<body>

<div class="form-card">

<h2>Input Jadwal</h2>

<div class="form-group">
<label>Kelas</label>
<input id="kelas">
</div>

<div class="form-group">
<label>Mata Pelajaran</label>
<input id="mapel">
</div>

<div class="form-group">
<label>Guru</label>
<input id="guru">
</div>

<div class="form-group">
<label>Hari</label>
<input id="hari" placeholder="Contoh: Senin">
</div>

<div class="form-group">
<label>Jam</label>
<input id="jam" placeholder="Contoh: 08:00-09:00">
</div>

<button onclick="simpan()">Simpan</button>

<p style="text-align:center;margin-top:10px;">
<a href="admin.html" style="color:#3498db;">← Kembali</a>
</p>

</div>

<script>

async function simpan(){

 const data={
  kelas:kelas.value,
  mapel:mapel.value,
  guru:guru.value,
  hari:hari.value,
  jam:jam.value
 }

 const r=await fetch("http://127.0.0.1:5000/tambah-jadwal",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(data)
 })

 const d=await r.json()

 alert(d.msg)

 // reset form
 kelas.value=""
 mapel.value=""
 guru.value=""
 hari.value=""
 jam.value=""

}

</script>

</body>
</html>
