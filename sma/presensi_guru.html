<!DOCTYPE html>
<html>
<head>
<title>Presensi Guru</title>

<style>
body{
 font-family:Arial;
 background:#1e2235;
 color:white;
}

.container{
 max-width:500px;
 margin:auto;
 padding:20px;
}

input{
 width:100%;
 padding:10px;
 margin-bottom:10px;
 border-radius:8px;
 border:none;
}

.card{
 background:#2b3048;
 padding:15px;
 border-radius:10px;
 margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Presensi Guru</h2>

<input type="text" id="searchGuru" placeholder="Cari guru..." onkeyup="filterGuru()">

<div id="listGuru"></div>

<button onclick="simpan()">Simpan</button>

</div>

<script>

let dataGuru=[]

async function loadGuru(){
 let r=await fetch("/get-guru")
 dataGuru=await r.json()

 let html=""
 dataGuru.forEach((g,i)=>{
  html+=`
  <div class="card">
   <b>${g.nama}</b>
   <select id="s${i}">
    <option>Hadir</option>
    <option>Izin</option>
    <option>Sakit</option>
    <option>Alfa</option>
   </select>
  </div>`
 })

 listGuru.innerHTML=html
}

function filterGuru(){
 let key=searchGuru.value.toLowerCase().trim()
 document.querySelectorAll(".card").forEach(c=>{
  c.style.display = c.innerText.toLowerCase().includes(key) ? "block":"none"
 })
}

async function simpan(){

 let data=[]

 dataGuru.forEach((g,i)=>{
  data.push({
   nip:g.nip,
   nama:g.nama,
   status:document.getElementById("s"+i).value
  })
 })

 await fetch("/presensi-guru",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({tanggal:new Date(),data})
 })

 alert("Tersimpan")
}

loadGuru()

</script>
</body>
</html>
