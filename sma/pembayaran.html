<!DOCTYPE html>
<html>
<head>

<title>Pembayaran</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#1e2235;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:white;
}

.form-card{
 background:#2b3048;
 padding:30px;
 border-radius:15px;
 width:380px;
}

input{
 width:100%;
 padding:12px;
 border-radius:8px;
 border:none;
 margin-bottom:10px;
}

button{
 width:100%;
 padding:12px;
 background:#27ae60;
 border:none;
 border-radius:8px;
 color:white;
 cursor:pointer;
}
</style>

</head>

<body>

<div class="form-card">

<h2>Pembayaran</h2>

<label>NIS</label>
<input id="nis" readonly>

<label>Nama</label>
<input id="nama" readonly>

<label>Jumlah Bayar</label>
<input id="jumlah" readonly>

<button onclick="bayar()">Bayar</button>

</div>

<script>

// ================= LOAD DATA SISWA =================
const nisUser = localStorage.getItem("username")

// set NIS
document.getElementById("nis").value = nisUser

// ambil tagihan dari backend
fetch("http://127.0.0.1:5000/get-tagihan/" + nisUser)
.then(res => res.json())
.then(data => {

    if(!data.nis){
        alert("Tidak ada tagihan")
        return
    }

    document.getElementById("nama").value = data.nama
    document.getElementById("jumlah").value = data.jumlah
})

// ================= BAYAR =================
async function bayar(){

 const data={
  nis:nis.value,
  nama:nama.value,
  jumlah:jumlah.value,
  tanggal: new Date().toISOString()
 }

 const r=await fetch("http://127.0.0.1:5000/pembayaran",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(data)
 })

 const d=await r.json()

 alert(d.msg)
}

</script>

</body>
</html>
