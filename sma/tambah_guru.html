<!DOCTYPE html>
<html>
<head>

<title>Tambah Guru</title>

<style>

body{
 margin:0;
 font-family:Arial;
 background:#1e2235;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:white;
}

/* CARD FORM */

.form-card{
 background:#2b3048;
 padding:30px;
 border-radius:15px;
 width:380px;
 box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

.form-card h2{
 text-align:center;
 margin-bottom:20px;
}

/* FORM */

.form-group{
 margin-bottom:15px;
}

.form-group label{
 display:block;
 margin-bottom:5px;
}

.form-group input{
 width:100%;
 padding:12px;
 border-radius:8px;
 border:none;
 outline:none;
}

/* BUTTON */

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 background:#27ae60;
 border:none;
 border-radius:8px;
 color:white;
 font-size:16px;
 cursor:pointer;
 transition:0.3s;
}

button:hover{
 background:#219150;
 transform:scale(1.03);
}

</style>

</head>

<body>

<div class="form-card">

<h2>Tambah Guru</h2>

<div class="form-group">
<label>NIP</label>
<input id="nip">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password">
</div>

<div class="form-group">
<label>Nama Guru</label>
<input id="nama">
</div>

<div class="form-group">
<label>Mata Pelajaran</label>
<input id="mapel">
</div>

<div class="form-group">
<label>Jabatan</label>
<input id="jabatan">
</div>

<button onclick="simpan()">Simpan</button>

</div>

<script>

async function simpan(){

 const data = {
  nip: nip.value,
  password: password.value,
  nama: nama.value,
  mapel: mapel.value,
  jabatan: jabatan.value
 }

 const r = await fetch("http://127.0.0.1:5000/tambah-guru",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(data)
 })

 const res = await r.json()

 alert(res.msg)

 // reset form
 nip.value=""
 password.value=""
 nama.value=""
 mapel.value=""
 jabatan.value=""

}

</script>

</body>
</html>
