<!DOCTYPE html>
<html>
<head>

<title>Input Jadwal</title>

<style>

body{
 margin:0;
 font-family:Arial;
 background:#1e2235;
 display:flex;
 justify-content:center;
 align-items:center;
 min-height:100vh;
 color:white;
 padding:20px;
}

/* CARD */

.form-card{
 background:#2b3048;
 padding:30px;
 border-radius:15px;
 width:100%;
 max-width:400px;
 box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

.form-card h2{
 text-align:center;
 margin-bottom:20px;
}

/* FORM */

.form-group{
 margin-bottom:15px;
}

.form-group label{
 display:block;
 margin-bottom:5px;
}

.form-group input,
.form-group select{
 width:100%;
 padding:12px;
 border-radius:8px;
 border:none;
 outline:none;
}

/* BUTTON */

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 background:#27ae60;
 border:none;
 border-radius:8px;
 color:white;
 font-size:16px;
 cursor:pointer;
 transition:0.3s;
}

button:hover{
 background:#219150;
 transform:scale(1.03);
}

/* RESPONSIVE */

@media(max-width:500px){

 .form-card{
  padding:20px;
 }

}

</style>

</head>

<body>

<div class="form-card">

<h2>Input Jadwal</h2>

<!-- KELAS -->
<div class="form-group">
<label>Kelas</label>

<select id="kelas">
 <option value="">-- Pilih Kelas --</option>
</select>

</div>

<!-- MAPEL -->
<div class="form-group">
<label>Mata Pelajaran</label>
<input id="mapel">
</div>

<!-- GURU -->
<div class="form-group">
<label>Guru</label>
<input id="guru">
</div>

<!-- HARI -->
<div class="form-group">
<label>Hari</label>

<select id="hari">
 <option>Senin</option>
 <option>Selasa</option>
 <option>Rabu</option>
 <option>Kamis</option>
 <option>Jumat</option>
 <option>Sabtu</option>
</select>

</div>

<!-- JAM -->
<div class="form-group">
<label>Jam</label>
<input id="jam" placeholder="Contoh: 08:00-09:00">
</div>

<button onclick="simpan()">Simpan</button>

<p style="text-align:center;margin-top:10px;">
<a href="admin.html" style="color:#3498db;">
← Kembali
</a>
</p>

</div>

<script>

// ================= LOAD KELAS DARI DB =================
async function loadKelas(){

 let r = await fetch("http://127.0.0.1:5000/get_kelas")

 let data = await r.json()

 let html = `
 <option value="">-- Pilih Kelas --</option>
 `

 data.forEach(k=>{

  html += `
  <option value="${k}">
   ${k}
  </option>
  `

 })

 kelas.innerHTML = html
}

// ================= SIMPAN =================
async function simpan(){

 const data = {

  kelas: kelas.value,
  mapel: mapel.value,
  guru: guru.value,
  hari: hari.value,
  jam: jam.value

 }

 const r = await fetch(
  "http://127.0.0.1:5000/tambah-jadwal",
 {

  method:"POST",

  headers:{
   "Content-Type":"application/json"
  },

  body:JSON.stringify(data)

 })

 const d = await r.json()

 alert(d.msg)

 // reset
 kelas.value=""
 mapel.value=""
 guru.value=""
 hari.value="Senin"
 jam.value=""

}

// ================= START =================
loadKelas()

</script>

</body>
</html>
