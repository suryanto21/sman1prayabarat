<!DOCTYPE html>
<html>
<head>
<title>Kelola Data</title>

<style>
body{
 font-family:Arial;
 background:#1e2235;
 color:white;
 padding:30px;
}

input{
 padding:10px;
 margin:5px 0;
 border-radius:8px;
 border:none;
 width:100%;
}

table{
 width:100%;
 border-collapse:collapse;
 background:#2b3048;
 margin-bottom:30px;
}

th,td{
 padding:10px;
 border-bottom:1px solid #444;
}

th{background:#3498db;}

button{
 padding:5px 10px;
 margin:2px;
 border:none;
 border-radius:5px;
 cursor:pointer;
}

.hapus{background:#e74c3c;color:white;}
.edit{background:#f1c40f;}
.simpan{background:#27ae60;color:white;}

.modal{
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.7);
 justify-content:center;
 align-items:center;
}

.modal-box{
 background:#2b3048;
 padding:20px;
 border-radius:10px;
 width:300px;
}
</style>

</head>

<body>

<h2>DATA SISWA</h2>

<input type="text" id="searchSiswa" placeholder="Cari siswa..." onkeyup="cariSiswa()">

<table>
<thead>
<tr>
<th>NIS</th>
<th>Nama</th>
<th>Kelas</th>
<th>Wali Kelas</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="siswa"></tbody>
</table>

<h2>DATA GURU</h2>

<input type="text" id="searchGuru" placeholder="Cari guru..." onkeyup="cariGuru()">

<table>
<thead>
<tr>
<th>NIP</th>
<th>Nama</th>
<th>Mapel</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="guru"></tbody>
</table>

<!-- MODAL SISWA (EDIT ONLY) -->
<div class="modal" id="modalSiswa">
<div class="modal-box">
<h3>Edit Siswa</h3>

<input id="s_nis" placeholder="NIS">
<input id="s_nama" placeholder="Nama">
<input id="s_kelas" placeholder="Kelas">
<input id="s_wali" placeholder="Wali Kelas">

<button class="simpan" onclick="simpanSiswa()">Simpan</button>
<button onclick="tutupSiswa()">Batal</button>

</div>
</div>

<!-- MODAL GURU (EDIT ONLY) -->
<div class="modal" id="modalGuru">
<div class="modal-box">
<h3>Edit Guru</h3>

<input id="g_nip" placeholder="NIP">
<input id="g_nama" placeholder="Nama">
<input id="g_mapel" placeholder="Mapel">

<button class="simpan" onclick="simpanGuru()">Simpan</button>
<button onclick="tutupGuru()">Batal</button>

</div>
</div>

<script>

let dataSiswa=[], dataGuru=[]
let editNis="", editNip=""

// ================= LOAD =================
async function load(){
 let r1=await fetch("/get-siswa")
 dataSiswa=await r1.json()

 let r2=await fetch("/get-guru")
 dataGuru=await r2.json()

 renderSiswa()
 renderGuru()
}

// ================= RENDER =================
function renderSiswa(){
 let html=""
 dataSiswa.forEach(d=>{
  html+=`
  <tr>
   <td>${d.nis}</td>
   <td>${d.nama}</td>
   <td>${d.kelas}</td>
   <td>${d.wali_kelas || d.wali || '-'}</td>
   <td>
    <button class="edit" onclick="editSiswa('${d.nis}')">Edit</button>
    <button class="hapus" onclick="hapusSiswa('${d.nis}')">Hapus</button>
   </td>
  </tr>`
 })
 siswa.innerHTML=html
}

function renderGuru(){
 let html=""
 dataGuru.forEach(d=>{
  html+=`
  <tr>
   <td>${d.nip}</td>
   <td>${d.nama}</td>
   <td>${d.mapel}</td>
   <td>
    <button class="edit" onclick="editGuru('${d.nip}')">Edit</button>
    <button class="hapus" onclick="hapusGuru('${d.nip}')">Hapus</button>
   </td>
  </tr>`
 })
 guru.innerHTML=html
}

// ================= SEARCH =================
function cariSiswa(){
 let key=searchSiswa.value.toLowerCase()
 document.querySelectorAll("#siswa tr").forEach(r=>{
  r.style.display = r.innerText.toLowerCase().includes(key) ? "" : "none"
 })
}

function cariGuru(){
 let key=searchGuru.value.toLowerCase()
 document.querySelectorAll("#guru tr").forEach(r=>{
  r.style.display = r.innerText.toLowerCase().includes(key) ? "" : "none"
 })
}

// ================= EDIT =================
function editSiswa(nis){
 let d=dataSiswa.find(x=>x.nis==nis)

 editNis=nis

 s_nis.value=d.nis
 s_nama.value=d.nama
 s_kelas.value=d.kelas
 s_wali.value = d.wali_kelas || d.wali || ""

 modalSiswa.style.display="flex"
}

function editGuru(nip){
 let d=dataGuru.find(x=>x.nip==nip)

 editNip=nip

 g_nip.value=d.nip
 g_nama.value=d.nama
 g_mapel.value=d.mapel

 modalGuru.style.display="flex"
}

// ================= SIMPAN =================
async function simpanSiswa(){
 await fetch("/update-siswa/"+editNis,{
  method:"PUT",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   nis:s_nis.value,
   nama:s_nama.value,
   kelas:s_kelas.value,
   wali_kelas:s_wali.value
  })
 })

 tutupSiswa()
 load()
}

async function simpanGuru(){
 await fetch("/update-guru/"+editNip,{
  method:"PUT",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   nip:g_nip.value,
   nama:g_nama.value,
   mapel:g_mapel.value
  })
 })

 tutupGuru()
 load()
}

// ================= DELETE =================
async function hapusSiswa(nis){
 if(!confirm("Yakin hapus?")) return
 await fetch("/hapus-siswa/"+nis,{method:"DELETE"})
 load()
}

async function hapusGuru(nip){
 if(!confirm("Yakin hapus?")) return
 await fetch("/hapus-guru/"+nip,{method:"DELETE"})
 load()
}

// ================= CLOSE =================
function tutupSiswa(){modalSiswa.style.display="none"}
function tutupGuru(){modalGuru.style.display="none"}

// ================= INIT =================
load()

</script>

</body>
</html>
