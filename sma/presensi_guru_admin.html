<!DOCTYPE html>
<html>
<head>

<title>Presensi Guru (Admin)</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#1e2235;
 color:white;
}

/* CONTAINER */
.container{
 max-width:600px;
 margin:auto;
 padding:20px;
}

/* SEARCH */
input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 margin-bottom:15px;
}

/* CARD */
.card{
 background:#2b3048;
 padding:15px;
 border-radius:10px;
 margin-bottom:10px;
 box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* SELECT */
select{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 margin-top:10px;
}

/* BUTTON */
button{
 width:100%;
 padding:12px;
 background:#27ae60;
 border:none;
 border-radius:8px;
 color:white;
 margin-top:15px;
 cursor:pointer;
}

button:hover{
 background:#219150;
}
</style>

</head>

<body>

<div class="container">

<h2>Presensi Guru (Admin)</h2>

<!-- 🔍 SEARCH -->
<input type="text" id="searchGuru" placeholder="Cari guru..." onkeyup="filterGuru()">

<!-- 📋 LIST -->
<div id="listGuru"></div>

<button onclick="simpan()">Simpan Presensi</button>

</div>

<script>

let dataGuru = []

// ================= LOAD DATA GURU =================
async function loadGuru(){

 const r = await fetch("http://127.0.0.1:5000/get-guru")
 dataGuru = await r.json()

 let html = ""

 dataGuru.forEach((g, i)=>{
  html += `
  <div class="card">
    <b>${g.nama}</b><br>
    <small>${g.mapel}</small>

    <select id="status${i}">
      <option>Hadir</option>
      <option>Izin</option>
      <option>Sakit</option>
      <option>Alfa</option>
    </select>
  </div>
  `
 })

 document.getElementById("listGuru").innerHTML = html
}

loadGuru()

// ================= SEARCH (CASE INSENSITIVE) =================
function filterGuru(){

 let keyword = document
  .getElementById("searchGuru")
  .value
  .toLowerCase()
  .trim()

 let cards = document.querySelectorAll(".card")

 cards.forEach(c=>{
  let text = c.innerText.toLowerCase()
  c.style.display = text.includes(keyword) ? "block" : "none"
 })

}

// ================= SIMPAN PRESENSI =================
async function simpan(){

 let hasil = []

 dataGuru.forEach((g, i)=>{
  hasil.push({
    nip: g.nip,
    nama: g.nama,
    mapel: g.mapel,
    status: document.getElementById("status"+i).value
  })
 })

 const data = {
  tanggal: new Date().toISOString().split("T")[0],
  data: hasil
 }

 const r = await fetch("http://127.0.0.1:5000/presensi-guru",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify(data)
 })

 const res = await r.json()

 alert(res.msg || "Presensi tersimpan")
}

</script>

</body>
</html>
