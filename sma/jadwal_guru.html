<!DOCTYPE html>
<html>
<head>

<title>Jadwal Guru</title>

<style>

body{
 margin:0;
 font-family:Arial;
 background:#1e2235;
 color:white;
}

/* CONTAINER */

.container{
 max-width:900px;
 margin:50px auto;
}

/* TITLE */

h2{
 text-align:center;
 margin-bottom:30px;
}

/* CARD */

.card{
 background:#2b3048;
 padding:20px;
 border-radius:12px;
 box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* SEARCH BOX */

.search-box{
 display:flex;
 gap:10px;
 justify-content:center;
 align-items:center;
}

/* INPUT */

input{
 padding:12px;
 border-radius:8px;
 border:none;
 width:300px;
 outline:none;
}

/* BUTTON */

button{
 padding:12px 18px;
 background:#3498db;
 border:none;
 border-radius:8px;
 color:white;
 cursor:pointer;
 transition:0.3s;
}

button:hover{
 background:#2980b9;
 transform:scale(1.05);
}

/* TABLE */

.table-box{
 margin-top:25px;
}

table{
 width:100%;
 border-collapse:collapse;
 background:#2b3048;
 border-radius:10px;
 overflow:hidden;
 box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

thead{
 background:#3498db;
}

th{
 padding:14px;
 text-align:left;
}

td{
 padding:12px;
 border-bottom:1px solid #3a3f5a;
}

/* ZEBRA */

tbody tr:nth-child(even){
 background:#252a40;
}

/* HOVER */

tbody tr:hover{
 background:#3a3f5a;
 transition:0.3s;
}

/* EMPTY TEXT */

.empty{
 text-align:center;
 color:#aaa;
 font-style:italic;
 padding:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Cari Jadwal Guru</h2>

<div class="card">

<div class="search-box">
<input id="guru" placeholder="Masukkan Nama Guru">
<button onclick="cari()">Cari</button>
</div>

</div>

<div class="table-box">

<table>
<thead>
<tr>
<th>Kelas</th>
<th>Mapel</th>
<th>Hari</th>
<th>Jam</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

</div>

<script>

async function cari(){

 const nama = document.getElementById("guru").value

 const r = await fetch("http://127.0.0.1:5000/jadwal-guru/" + nama)
 const d = await r.json()

 let html=""

 if(d.length == 0){
  html = "<tr><td colspan='4' class='empty'>Tidak ada jadwal ditemukan</td></tr>"
 }else{

  d.forEach(j => {

   html += `
   <tr>
    <td>${j.kelas || '-'}</td>
    <td>${j.mapel || '-'}</td>
    <td>${j.hari || '-'}</td>
    <td>${j.jam || '-'}</td>
   </tr>
   `
  })

 }

 document.getElementById("data").innerHTML = html

}

</script>

</body>
</html>
